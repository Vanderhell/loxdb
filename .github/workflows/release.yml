name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            archive_ext: tar.gz
            configure_preset: release-linux
            build_preset: release-linux
            test_preset: release-linux
            build_dir: build/release-linux
          - os: windows-latest
            label: windows-x64
            archive_ext: zip
            configure_preset: release-windows
            build_preset: release-windows
            test_preset: release-windows
            build_dir: build/release-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="dev-${GITHUB_RUN_NUMBER}"
          fi
          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Configure
        run: cmake --preset ${{ matrix.configure_preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.build_preset }}

      - name: Test
        run: ctest --preset ${{ matrix.test_preset }}

      - name: Install
        run: cmake --install ${{ matrix.build_dir }} --config Release --prefix stage/microdb-${{ steps.version.outputs.value }}-${{ matrix.label }}

      - name: Package archive (Linux)
        if: runner.os == 'Linux'
        working-directory: stage
        run: tar -czf microdb-${{ steps.version.outputs.value }}-${{ matrix.label }}.${{ matrix.archive_ext }} microdb-${{ steps.version.outputs.value }}-${{ matrix.label }}

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: stage
        run: Compress-Archive -Path microdb-${{ steps.version.outputs.value }}-${{ matrix.label }} -DestinationPath microdb-${{ steps.version.outputs.value }}-${{ matrix.label }}.${{ matrix.archive_ext }}

      - name: Generate checksum (Linux)
        if: runner.os == 'Linux'
        working-directory: stage
        run: sha256sum microdb-${{ steps.version.outputs.value }}-${{ matrix.label }}.${{ matrix.archive_ext }} > microdb-${{ steps.version.outputs.value }}-${{ matrix.label }}.${{ matrix.archive_ext }}.sha256

      - name: Generate checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: stage
        run: |
          $name = "microdb-${{ steps.version.outputs.value }}-${{ matrix.label }}.${{ matrix.archive_ext }}"
          $hash = (Get-FileHash $name -Algorithm SHA256).Hash.ToLower()
          "$hash  $name" | Out-File -FilePath "$name.sha256" -Encoding ascii

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: |
            stage/microdb-${{ steps.version.outputs.value }}-${{ matrix.label }}.${{ matrix.archive_ext }}
            stage/microdb-${{ steps.version.outputs.value }}-${{ matrix.label }}.${{ matrix.archive_ext }}.sha256

  publish-release:
    name: Publish GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download bundles
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/*.zip
            release-assets/**/*.tar.gz
            release-assets/**/*.sha256
